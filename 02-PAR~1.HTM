<!--
  SYNTHETIC TEST SAMPLE — NOT A REAL AD. Detection QA only.
  Isolated signature: PARAM_GATED_NOOP (differential rendering).
  Without the gate param the button is a dead no-op (what a reviewer/crawler
  sees). With it, the page comes alive. Destination stays on example.com.
-->
<!doctype html>
<html><head><meta charset="utf-8"><title>Claim reward</title></head>
<body>
  <h1>Claim your reward</h1>
  <a id="ctaButton" href="#">Continue</a>
  <script>
  (function(){
    var q = new URLSearchParams(window.location.search);
    var offer = q.get('offer');
    var btn = document.getElementById('ctaButton');
    if (!offer) { btn.onclick = function(e){ e.preventDefault(); }; return; }
    btn.onclick = function(e){ e.preventDefault(); window.location.href = 'https://example.com/' + encodeURIComponent(offer); };
  })();
  </script>
</body></html>
