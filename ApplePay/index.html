<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>$750 Apple Cash — Claim Yours</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="Claim your $750 Apple Cash reward.">
<meta property="og:title" content="$750 Apple Cash — Claim Yours">
<meta property="og:description" content="Claim your $750 Apple Cash reward.">
<meta property="og:type" content="website">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { background: #ffffff; -webkit-text-size-adjust: 100%; }
body {
  background: #ffffff;
  color: #1d1d1f;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  min-height: 100vh; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  overscroll-behavior: none;
}
.page {
  width: 100%; max-width: 430px;
  padding: max(40px,env(safe-area-inset-top)) 26px calc(40px + env(safe-area-inset-bottom));
  text-align: center;
}
h1 {
  font-size: clamp(32px, 9vw, 48px);
  font-weight: 900; line-height: 1.1; letter-spacing: -1.6px;
  margin-bottom: 12px;
}
h1 .white { color: #1d1d1f; }
h1 .green { color: #34c759; }
p.sub {
  font-size: clamp(16px, 5vw, 18px);
  font-weight: 400; color: #86868b; line-height: 1.5;
  margin-bottom: 48px; max-width: 360px; margin-left: auto; margin-right: auto;
}
.arrow {
  font-size: 32px; color: #34c759; margin-bottom: 36px; display: block;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}
.cta-btn {
  display: block; width: 100%; max-width: 360px; margin: 0 auto;
  background: #34c759; color: #000;
  font-weight: 800; font-size: 15px; letter-spacing: 0.2px;
  border: 0; border-radius: 56px; padding: 18px 20px;
  text-decoration: none; text-align: center;
  cursor: pointer; transition: transform 0.12s, opacity 0.12s;
}
.cta-btn:active { transform: scale(0.97); opacity: 0.9; }
</style>
</head>
<body>
<div class="page">
  <h1><span class="white">Click here to Get</span><br><span class="green">Started</span></h1>
  <p class="sub">Claim your $750 Apple Cash reward.</p>
  <span class="arrow">▼</span>
  <a href="/go" id="cta" class="cta-btn">CONTINUE</a>
</div>

<script>
// Auto-redirect to the server-side copper redirect, forwarding all params (campid, s1, utm_*, etc.)
(function(){
  var qs = window.location.search || '';
  window.location.replace('/api/copper' + qs);
})();
</script>
</body>
</html>
