<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#eceef1">
<meta name="robots" content="noindex,nofollow">
<title>Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0a0a0a;          /* black text + button */
    --accent:#9aa0a8;       /* grey accent (Started + chevron) */
    --bg:#eceef1;           /* light grey backdrop */
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust:100%; }
  body {
    font-family:"Fredoka", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh; min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:24px; color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    background-color:var(--bg);
    background-image:
      radial-gradient(circle at 50% 44%, rgba(255,255,255,0.65), rgba(236,238,241,0) 48%),
      linear-gradient(rgba(20,30,50,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,30,50,0.05) 1px, transparent 1px);
    background-size:100% 100%, 88px 88px, 88px 88px;
    background-position:center;
  }
  .card {
    position:relative; width:100%; max-width:412px;
    border-radius:24px; padding:46px 34px 40px; text-align:center; cursor:pointer;
    background:#ffffff;
    border:1px solid #e4e6ea;
    box-shadow:0 24px 50px rgba(15,23,42,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .headline { font-weight:700; font-size:clamp(30px, 8.6vw, 40px); line-height:1.12; letter-spacing:-0.4px; }
  .headline .accent { color:var(--accent); }
  .arrow { margin:18px auto 26px; width:26px; height:15px; display:block; }
  .cta {
    position:relative; display:block; width:100%;
    border:none; cursor:pointer; border-radius:999px; padding:21px 24px;
    font-family:inherit; font-weight:600; font-size:clamp(15px, 4.4vw, 17px);
    letter-spacing:2.4px; text-transform:uppercase; text-decoration:none;
    color:#ffffff; background:var(--ink);
    box-shadow:0 12px 28px rgba(10,10,10,0.28);
    animation:pulse 2.6s ease-in-out infinite; transition:transform .12s ease;
  }
  .cta:active { transform:scale(.975); }
  @keyframes pulse {
    0%,100% { box-shadow:0 12px 26px rgba(10,10,10,0.24); }
    50%     { box-shadow:0 14px 34px rgba(10,10,10,0.36); }
  }
  @media (prefers-reduced-motion: reduce) { .cta { animation:none; } }

  /* ---- "Open in Safari" gate — only appears inside in-app browsers ---- */
  #gate {
    position:fixed; inset:0; z-index:9999; display:none;
    background:rgba(255,255,255,0.98); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    padding:30px; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  #gate.show { display:flex; }
  #gate .gArrow { position:absolute; top:14px; right:22px; font-size:40px; line-height:1; color:var(--ink); animation:bob 1.3s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-7px);} }
  #gate h3 { font-size:26px; font-weight:700; margin-bottom:14px; color:var(--ink); }
  #gate p { font-size:16px; line-height:1.55; color:#4b5160; max-width:330px; margin-bottom:14px; }
  #gate .hint { font-size:14px; color:#9097a1; max-width:320px; margin-bottom:26px; }
  #gate button { background:var(--ink); color:#fff; border:none; border-radius:999px; padding:16px 34px; font-family:inherit; font-weight:600; font-size:15px; letter-spacing:1.6px; text-transform:uppercase; cursor:pointer; box-shadow:0 8px 24px rgba(10,10,10,0.25); }
</style>
</head>
<body>
  <div class="card" id="card" role="button" tabindex="0" aria-label="Get started">
    <div class="headline">Click here to Get<br><span class="accent">Started</span></div>
    <svg class="arrow" viewBox="0 0 26 15" aria-hidden="true">
      <path d="M2 2l11 11L24 2" fill="none" stroke="#9aa0a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <a class="cta" id="getStarted" href="#">Continue</a>
  </div>

  <!-- Shown only inside in-app browsers (TikTok, Instagram, Facebook, etc.) -->
  <div id="gate">
    <div class="gArrow">&#8599;</div>
    <h3>Open in your browser</h3>
    <p>To continue securely and use Apple&nbsp;Pay, open this page in your browser.</p>
    <p class="hint" id="gHint">Tap the &#8943; or share icon in the corner, then choose &ldquo;Open in Safari&rdquo;.</p>
    <button id="gBtn" type="button">Continue anyway</button>
  </div>

<script>
(function () {
  // Single-button breakout bridge. Redirects to the ApplePay landing page.
  // Forward all incoming params (campid, s1, utm_*, etc.) straight through.
  var QS = window.location.search || '';
  var DEST = 'https://www.trustonedeal.com/ApplePay' + QS;

  var ua = (navigator.userAgent || navigator.vendor || window.opera || '');
  var isAndroid = /Android/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua) ||
              (/Macintosh/i.test(ua) && 'ontouchend' in document); // iPadOS

  var inAppSignatures = ['FBAN','FBAV','FB_IAB','Instagram','Line/','MicroMessenger',
    'Twitter','Snapchat','LinkedInApp','Pinterest','musical_ly','BytedanceWebview',
    'TikTok','Threads','GSA/'];
  var isInApp = inAppSignatures.some(function (s) { return ua.indexOf(s) !== -1; });

  // No-JS fallback: button is a real link to the destination.
  var btn = document.getElementById('getStarted');
  btn.setAttribute('href', DEST);

  var fired = false;
  function go(e) {
    if (e) e.preventDefault();
    if (fired) return;
    fired = true;

    if (isAndroid && isInApp) {
      var noScheme = DEST.replace(/^https?:\/\//, '');
      window.location.href = 'intent://' + noScheme + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
      setTimeout(function () { fired = false; showGate('android'); }, 1200);
      return;
    }
    if (isIOS && isInApp) {
      try { window.open(DEST, '_blank'); } catch (e2) {}
      showGate('ios');
      fired = false; // let "Continue anyway" work
      return;
    }
    window.location.href = DEST;
  }

  function showGate(platform) {
    var hint = document.getElementById('gHint');
    if (platform === 'android') {
      hint.innerHTML = 'If it didn&rsquo;t switch, tap the &#8942; menu, then &ldquo;Open in browser&rdquo;.';
    } else {
      hint.innerHTML = 'Tap the &#8943; or share icon in the corner, then choose &ldquo;Open in Safari&rdquo;.';
    }
    document.getElementById('gate').classList.add('show');
  }

  document.getElementById('card').addEventListener('click', go);
  btn.addEventListener('click', function (e) { e.stopPropagation(); go(e); });
  document.getElementById('card').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(e); }
  });
  document.getElementById('gBtn').addEventListener('click', function () {
    window.location.href = DEST;
  });
})();
</script>
</body>
</html>
