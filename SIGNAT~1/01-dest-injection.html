<!--
  SYNTHETIC TEST SAMPLE — NOT A REAL AD. Detection QA only.
  Isolated signature: DEST_INJECTION.
  The landing page has no destination of its own; it reads one from the URL at
  runtime, so a reviewer never sees where real traffic actually goes.
  Harmless fallback destination: https://example.com
-->
<!doctype html>
<html><head><meta charset="utf-8"><title>Continue</title></head>
<body>
  <h1>Special offer</h1>
  <a id="ctaButton" href="#">Continue</a>
  <script>
  (function(){
    var params = new URLSearchParams(window.location.search);
    var dest = params.get('dest') || 'https://example.com/offer';
    document.getElementById('ctaButton').onclick = function(e){
      e.preventDefault();
      window.location.href = dest;
    };
  })();
  </script>
</body></html>
