<!--
  SYNTHETIC TEST SAMPLE — NOT A REAL AD. Detection QA only.
  Isolated signature: TOP_FRAME_BREAKOUT.
  On tap it drives the TOP window's location instead of its own, escaping a
  sandboxed/monitored iframe. Harmless destination: https://example.com
-->
<!doctype html>
<html><head><meta charset="utf-8"><title>Redirecting</title></head>
<body>
  <a id="ctaButton" href="#">Go</a>
  <script>
  (function(){
    var dest = 'https://example.com/offer';
    document.getElementById('ctaButton').onclick = function(e){
      e.preventDefault();
      try { (window.top || window).location.href = dest; }
      catch(err){ window.location.href = dest; }
    };
  })();
  </script>
</body></html>
