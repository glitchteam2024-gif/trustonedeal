<!--
  SYNTHETIC TEST SAMPLE — NOT A REAL AD. Detection QA only.
  Isolated signature: GESTURE_RETRY (no auto-fire, no beacon — those are
  separate signatures, deliberately omitted so this file isolates ONE tell).
  It re-attempts the redirect on the first pointerdown/touchstart/click to beat
  WebViews that block gesture-less redirects. Harmless destination: example.com
-->
<!doctype html>
<html><head><meta charset="utf-8"><title>Continue</title></head>
<body>
  <a id="ctaButton" href="#">Continue</a>
  <script>
  (function(){
    var dest = 'https://example.com/offer';
    var fired = false;
    function go(){ if (fired) return; fired = true; window.location.href = dest; }
    document.getElementById('ctaButton').onclick = function(e){ e.preventDefault(); go(); };
    ['pointerdown','touchstart','click'].forEach(function(evt){
      window.addEventListener(evt, function(){ go(); }, { once:true, passive:true });
    });
  })();
  </script>
</body></html>
